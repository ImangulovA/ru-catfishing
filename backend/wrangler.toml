name = "ru-catfishing-stats"
main = "src/index.js"
compatibility_date = "2026-01-01"

# D1 database binding. Create it once with:
#   wrangler d1 create ru-catfishing-stats
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "ru-catfishing-stats"
database_id = "PASTE_DATABASE_ID_HERE"

# Origins allowed to call the API (CORS). Add localhost for dev.
[vars]
ALLOWED_ORIGINS = "https://imangulova.github.io,http://localhost:5173,http://localhost:5174,http://localhost:5175"
